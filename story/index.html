<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>客家茶故事</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; overflow: hidden; }
    #shell { max-width: 480px; height: 100vh; margin: 0 auto; position: relative; background: #111; box-shadow: 0 0 20px rgba(0, 0, 0, 0.45); }
    #chapter-frame { width: 100%; height: 100%; border: none; display: block; background: #111; pointer-events: none; }
    #start-overlay {
        position: absolute;
        inset: 0;
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.82));
    }
    #start-btn {
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        border-radius: 999px;
        padding: 12px 22px;
        font-size: 15px;
        cursor: pointer;
    }
    #audio-unlock {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.35);
        color: #fff;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 14px;
        cursor: pointer;
        display: none;
    }
</style>
</head>
<body>
<div id="shell">
    <audio id="global-bgm" src="./assets/Leaves_Unfolding_at_Daybreak.mp3" loop preload="auto" playsinline></audio>
    <iframe id="chapter-frame" title="客家茶故事章节" allow="autoplay; camera"></iframe>
    <div id="start-overlay">
        <button id="start-btn" type="button">点击进入故事并开启音乐</button>
    </div>
    <button id="audio-unlock" type="button">点击开启背景音乐</button>
</div>

<script>
    const frame = document.getElementById('chapter-frame');
    const globalBgm = document.getElementById('global-bgm');
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const unlockBtn = document.getElementById('audio-unlock');
    let isStoryStarted = false;

    const chapterMap = {
        ch1: './tea1_public.html?embed=1',
        ch2: './tea2-pages-repo/index.html?embed=1',
        ch3: './tea3-pages-repo/index.html?embed=1'
    };

    function ensureBgmPlayback() {
        globalBgm.volume = 0.65;
        const playPromise = globalBgm.play();
        if (playPromise && typeof playPromise.catch === 'function') {
            playPromise
                .then(() => {
                    unlockBtn.style.display = 'none';
                })
                .catch(() => {
                    unlockBtn.style.display = 'block';
                });
        } else {
            unlockBtn.style.display = 'none';
        }
    }

    function startStoryWithAudio() {
        if (isStoryStarted) {
            ensureBgmPlayback();
            return;
        }
        isStoryStarted = true;
        ensureBgmPlayback();
        frame.style.pointerEvents = 'auto';
        startOverlay.style.display = 'none';
    }

    function resolveChapterByUrl(url) {
        if (!url) {
            return null;
        }
        const value = String(url).toLowerCase();
        if (value.includes('tea2-pages-repo')) {
            return 'ch2';
        }
        if (value.includes('tea3-pages-repo')) {
            return 'ch3';
        }
        if (value.includes('tea1_public')) {
            return 'ch1';
        }
        return null;
    }

    function navigateToChapter(chapterKey) {
        const key = chapterMap[chapterKey] ? chapterKey : 'ch1';
        frame.src = chapterMap[key];
        if (window.location.hash !== `#${key}`) {
            history.replaceState(null, '', `#${key}`);
        }
    }

    window.__teaStoryNavigate = function(url) {
        const chapterKey = resolveChapterByUrl(url) || 'ch1';
        navigateToChapter(chapterKey);
    };

    window.addEventListener('hashchange', () => {
        const hash = window.location.hash.replace('#', '');
        navigateToChapter(hash || 'ch1');
    });

    window.addEventListener('message', (event) => {
        if (!event || !event.data || event.data.type !== 'tea-story-unlock-audio') {
            return;
        }
        ensureBgmPlayback();
    });

    document.addEventListener('DOMContentLoaded', () => {
        ['pointerdown', 'touchstart', 'click', 'keydown'].forEach((eventName) => {
            document.addEventListener(eventName, ensureBgmPlayback, { once: true });
        });
        unlockBtn.addEventListener('click', ensureBgmPlayback);
        startBtn.addEventListener('click', startStoryWithAudio);

        const initial = window.location.hash.replace('#', '') || 'ch1';
        navigateToChapter(initial);
    });
</script>
</body>
</html>
